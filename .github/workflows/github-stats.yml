name: Generate Stats Images

on:
  push:
    branches:
      - main
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

env:
  ZIG_GLOBAL_CACHE_DIR: /tmp/zig-cache
  ZIG_LOCAL_CACHE_DIR: /tmp/zig-cache

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.2

      - name: Build github-stats binary
        run: |
          git clone --depth 1 https://github.com/jstrieb/github-stats.git /tmp/github-stats
          cd /tmp/github-stats
          zig build --release

      - name: Compute exclude list (repos not pushed in the last 2 years)
        id: compute_excludes
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          MANUAL_EXCLUDES: ${{ secrets.EXCLUDE_REPOS }}
        run: |
          cutoff=$(date -u -d '2 years ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Cutoff date: $cutoff"
          stale=$(gh api --paginate '/user/repos?affiliation=owner,collaborator,organization_member&per_page=100' \
            --jq ".[] | select(.pushed_at < \"$cutoff\") | .full_name" \
            | paste -sd, -)
          echo "Stale repos: $stale"
          if [ -n "$MANUAL_EXCLUDES" ] && [ -n "$stale" ]; then
            combined="$MANUAL_EXCLUDES,$stale"
          else
            combined="${MANUAL_EXCLUDES}${stale}"
          fi
          echo "exclude_repos=$combined" >> "$GITHUB_OUTPUT"

      - name: Generate SVGs
        run: |
          mkdir -p /tmp/svg-output
          cd /tmp/svg-output
          /tmp/github-stats/zig-out/bin/github-stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          EXCLUDE_REPOS: ${{ steps.compute_excludes.outputs.exclude_repos }}
          EXCLUDE_LANGS: ${{ secrets.EXCLUDE_LANGS }}
          EXCLUDE_PRIVATE: "false"
          DEBUG: "false"
          MAX_RETRIES: 5

      - name: Build dark (tokyonight) variants of the SVGs
        run: |
          cd /tmp/svg-output
          for f in overview languages; do
            [ -f "${f}.svg" ] || continue
            cp "${f}.svg" "${f}-dark.svg"
            # Rewrite the SVG defaults so the dark variant renders dark
            # without depending on the :target anchor. Apply tokyonight palette.
            sed -i \
              -e 's/fill: white/fill: #1a1b27/g' \
              -e 's/stroke: rgb(225, 228, 232)/stroke: #2a2b3a/g' \
              -e 's/background-color: rgb(225, 228, 232)/background-color: #2a2b3a/g' \
              -e 's/color: rgb(3, 102, 214)/color: #7aa2f7/g' \
              -e 's/color: rgb(88, 96, 105)/color: #a9b1d6/g' \
              -e 's/fill: rgb(88, 96, 105)/fill: #565f89/g' \
              -e 's/color: rgb(36, 41, 46)/color: #c9d1d9/g' \
              -e 's/fill: rgb(36, 41, 46)/fill: #c9d1d9/g' \
              "${f}-dark.svg"
          done

      - name: Force-push SVGs to generated branch (orphan)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/gen-branch
          cd /tmp/gen-branch
          git init -q -b generated
          git config user.name "github-stats-bot"
          git config user.email "github-stats[bot]@users.noreply.github.com"
          cp /tmp/svg-output/overview.svg .
          cp /tmp/svg-output/overview-dark.svg .
          cp /tmp/svg-output/languages.svg .
          cp /tmp/svg-output/languages-dark.svg .
          git add overview.svg overview-dark.svg languages.svg languages-dark.svg
          git commit -q -m 'chore: update generated stats images'
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push -f origin generated
